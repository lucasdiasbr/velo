# Workflow de Integração Contínua focado em testes unitários.
# Estrutura preparada para futura expansão (ex: lint, build, e2e, deploy)

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  # Versão global do Node utilizada no pipeline
  NODE_VERSION: '24'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Faz o checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      # Configura o ambiente Node.js com a versão definida
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Instala as dependências do projeto usando yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Executa os testes unitários com Vitest
      - name: Run unit tests
        run: yarn test
